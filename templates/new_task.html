
{% extends "base.html" %}

{% block content %}
<h2>Add a New Task</h2>

{% if errors %}
<div class="alert alert-danger">
    <ul class="mb-0">
        {% for e in errors %}
        <li>{{ e }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form action="{{ url_for('new_task') }}" method="POST" class="mt-3">
    <div class="mb-3">
        <label for="group" class="form-label">Group</label>
        <input type="text"
               class="form-control"
               id="group"
               name="group"
               maxlength="50"
               value="{{ group if group is defined else '' }}"
               required>
        <div class="form-text">Example: "CS 101", "Work", "Life", "Errands".</div>
    </div>

    <div class="mb-3">
        <label for="title" class="form-label">Task Title</label>
        <input type="text"
               class="form-control"
               id="title"
               name="title"
               maxlength="100"
               value="{{ title if title is defined else '' }}"
               required>
        <div class="form-text">Short description of what you need to do.</div>
    </div>

    <div class="mb-3">
        <label for="due" class="form-label">Due Date</label>
        <input type="date"
               class="form-control"
               id="due"
               name="due"
               value="{{ due if due is defined else '' }}"
               required>
    </div>

    <div class="mb-3">
        <label for="priority" class="form-label">Priority (1–4)</label>
        <input type="number"
               class="form-control"
               id="priority"
               name="priority"
               min="1"
               max="4"
               value="{{ priority if priority is defined else '' }}"
               required>
        <div class="form-text">1 = highest priority, 4 = lowest.</div>
    </div>

    <button type="submit" class="btn btn-success">Save Task</button>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
