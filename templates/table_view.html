{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">Task Table View</h2>

<table class="table table-striped table-bordered">
    <thead>
        <tr>
            <th>Group</th>
            <th>Title</th>
            <th>Due</th>
            <th>Priority</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.group }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.due }}</td>
            <td>{{ task.priority }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Back to Card View</a>
{% endblock %}
