<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ADHD Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .task-card {
            width: 320px;
            margin: 10px;
        }
        .bucket-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .group-box {
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
        }
        .group-title {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <h1 class="mb-3">ADHD To-do Groups</h1>
        <a href="{{ url_for('table_view') }}" class="btn btn-outline-primary mb-3">View as Table</a>
            <p class="text-muted">Group your tasks into groups
                (classes, life areas, etc.), with due dates and priorities.</p>
            <hr>
            {% block content %}{% endblock %}
    </div>
  <!--Include the JavaScript for Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
    function toggleComplete(checkbox, taskId) {
        const card = document.getElementById("task-" + taskId);
        if (!card) return;
        if (checkbox.checked) {
            card.classList.add("completed");

            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 }
            });
        } else {
            card.classList.remove("completed");
        }
    }
</script>
</body>
</html>
